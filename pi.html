<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<title>Pi Tools | Calix Studio</title>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

</head>

<body>

<div class="site-logo">
<a href="index.html">
<img src="logo.png" alt="Calix Studio Logo">
</a>
</div>

<div class="container">

<h1>Pi Network Tools</h1>

<p class="tagline">
Useful tools for Pi Network pioneers.
</p>

<div class="tools">

<div class="card2">

<h3>Pi Value Calculator</h3>

<p>Estimate the future value of your Pi coins.</p>

<a href="#calculator">Open Tool</a>

</div>
<div class="card2" id="calculator">

<h3>Pi Coin Calculator</h3>

<select class="calc-input" id="currency" onchange="calculatePi()" width="5px">
<option value="$">USD ($)</option>
<option value="₹">INR (₹)</option>
<option value="€">EUR (€)</option>
<option value="£">GBP (£)</option>
<option value="¥">JPY (¥)</option>
</select>


<input class="calc-input" type="number" id="coins" placeholder="Number of Pi coins" oninput="calculatePi()">


<input class="calc-input" type="number" id="price" placeholder="Price per Pi ($)" oninput="calculatePi()">

<p id="result"></p>

</div>

</div>

</div>

</body>

</html>
