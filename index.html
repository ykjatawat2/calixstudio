<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calix Studio</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

.container{
    max-width:800px;
    margin:auto;
    padding:80px 20px;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

.tagline{
    font-size:20px;
    color:#94a3b8;
    margin-bottom:40px;
}

.tools{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:40px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:10px;
}

.card h3{
    margin:0 0 10px 0;
}

.footer{
    margin-top:60px;
    font-size:14px;
    color:#64748b;
}
</style>

</head>

<body>

<div class="container">
    <img src="logo.png" width="200">

<h1>Calix Studio</h1>

<p class="tagline">
Building simple tools for everyday problems.
</p>

<div class="tools">

<div class="card">
<h3>Crypto Calculator</h3>
<p>Calculate profit and ROI for your crypto trades.</p>
</div>

<div class="card">
<h3>Pi Coin Value Tool</h3>
<p>Estimate the future value of your Pi coins.</p>
</div>

<div class="card">
<h3>GST Calculator</h3>
<p>Quickly calculate GST amounts in India.</p>
</div>

</div>

<div class="footer">
<p>© 2026 Calix Studio</p>
<p>More tools coming soon.</p>
</div>

</div>

</body>

</html>
